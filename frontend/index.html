<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>say-draw —— AI 语音绘图工具</title>
  </head>
  <body>
    <div id="canvas-container"></div>

    <!-- 语音 HUD:麦克风按钮 + 识别字幕 -->
    <div id="hud">
      <button id="mic-btn" type="button">🎤 开始聆听</button>
      <div id="transcript" class="empty">点击按钮并允许麦克风权限后,开始说话…</div>
    </div>

    <!-- 生成式收尾:写实大图覆盖层 -->
    <div id="result-overlay" class="hidden">
      <img id="result-img" alt="生成的写实大图" />
      <div id="result-caption"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
