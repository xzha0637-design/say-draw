<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语音造图 —— 和 AI 聊出你要的画</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span class="brand">🎙️ 语音造图</span>
        <div class="top-actions">
          <span id="user-tag" class="user-tag"></span>
          <button id="myworks-btn" type="button" title="我的作品(历史会话)">🗂️ 我的画</button>
          <button id="reset-btn" type="button" title="新建一段会话">🆕 新会话</button>
          <button id="logout-btn" type="button" title="退出登录">退出</button>
        </div>
      </header>

      <!-- 主区:多轮对话 + 画面要素板(语义画布的可视化) -->
      <div id="main-row">
        <div id="chat"></div>
        <aside id="scene"></aside>
      </div>

      <!-- 版本条(检查点总览;点击或语音「回到第N张」跳转) -->
      <div id="versions" class="empty"></div>

      <!-- 语音 HUD:麦克风按钮 + 识别字幕 / 状态 -->
      <div id="hud">
        <div id="status" class="empty">点击下方按钮并允许麦克风,说说你想画什么…</div>
        <button id="mic-btn" type="button">🎤 开始聆听</button>
      </div>
    </div>

    <!-- 最终生成图片覆盖层 -->
    <div id="result-overlay" class="hidden">
      <img id="result-img" alt="生成的图片" />
      <div id="result-caption"></div>
    </div>

    <!-- 我的画(历史会话抽屉) -->
    <div id="drawer" class="hidden">
      <div class="drawer-panel">
        <div class="drawer-head">
          <span>🗂️ 我的画</span>
          <button id="drawer-close" type="button">✕</button>
        </div>
        <div id="drawer-list"></div>
      </div>
    </div>

    <!-- 登录 / 注册覆盖层 -->
    <div id="auth-overlay">
      <form id="auth-form" class="auth-card">
        <div id="auth-title" class="auth-title">登录</div>
        <div class="auth-sub">语音造图 · 你的作品按账号隔离、自动保存、随时下载</div>
        <input id="auth-user" type="text" autocomplete="username" placeholder="用户名(2~20 位)" />
        <input id="auth-pass" type="password" autocomplete="current-password" placeholder="密码(至少 4 位)" />
        <div id="auth-err" class="auth-err"></div>
        <button id="auth-submit" type="submit">登录</button>
        <button id="auth-toggle" type="button" class="auth-toggle">没有账号?去注册</button>
      </form>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
